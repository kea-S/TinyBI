prompts:
  - "{{query}}"

providers:
  - id: python:./provider.py
    label: 'Agent: gpt-4o'
    config:
      model_name: 'gpt-4o'
      local: false

  - id: python:./provider.py
    label: 'Agent: gemma-4b'
    config:
      model_name: "gemma3:4b"
      local: true

  - id: python:./provider.py
    label: 'Agent: llama3.2'
    config:
      model_name: "llama3.2:3b"
      local: true

  - id: python:./provider.py
    label: 'Agent: Qwen2.5-coder'
    config:
      model_name: "qwen2.5-coder:3b"
      local: true

tests:
  - vars:
      id: example-001
      description: "Time series test case"
      query: "Time series by month of total_parcels"
      ground_truth: "0104.10.10"

  - vars:
      id: example-002
      description: "Underperforming providers test case"
      query: "List the top 5 underperforming logistics providers by average bwt in jan"
      ground_truth: "90.25"
